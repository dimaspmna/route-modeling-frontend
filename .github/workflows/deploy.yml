name: 🚀 Deploy React App via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🛠️ Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      - name: ⚡ Build React App
        run: CI='' npm run build

      - name: 📤 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_OSES_SERVER }}
          username: ${{ secrets.FTP_OSES_USERNAME }}
          password: ${{ secrets.FTP_OSES_PASSWORD }}
          local-dir: ./build/
          server-dir: ${{ secrets.FTP_OSES_SERVER_DIR }}
          cleanup: true
